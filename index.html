<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Check the current estimated wait time at our clinic. No account needed." />
  <title>Clinic Wait Time</title>
  <style>
    /* ── Accessible color palette (all contrast ratios vs white tested) ──────
       --teal  #0d7a6e  → 5.1:1  ✓ WCAG AA (normal + large text)
       --navy  #0a3d54  → 13:1   ✓ WCAG AAA
       --muted #4a5c6a  → 7.3:1  ✓ WCAG AA (normal + large text)
       --red   #b91c1c  → 5.9:1  ✓ WCAG AA
    ──────────────────────────────────────────────────────────────────────── */
    :root {
      --teal:    #0d7a6e;
      --navy:    #0a3d54;
      --mint:    #e8f7f5;
      --page-bg: #f4f8fb;
      --white:   #ffffff;
      --muted:   #4a5c6a;
      --red:     #b91c1c;
    }

    /* ── Skip link (keyboard / screen reader navigation) ─────────────────── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      background: var(--navy);
      color: var(--white);
      padding: 0.5rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 0 0 0.5rem 0.5rem;
      text-decoration: none;
      z-index: 9999;
    }
    .skip-link:focus { top: 0; }

    /* ── Focus ring — visible for keyboard users, absent for mouse ───────── */
    :focus-visible {
      outline: 3px solid var(--teal);
      outline-offset: 3px;
      border-radius: 4px;
    }
    :focus:not(:focus-visible) { outline: none; }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page layout ─────────────────────────────────────────────────────── */
    html { height: 100%; }
    body {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--page-bg);
      color: var(--navy);
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .site-header {
      text-align: center;
      padding: 1.5rem 1rem 0.5rem;
    }
    /* h1 is the clinic name — intentionally secondary to the wait number */
    .site-header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: -0.01em;
    }

    /* ── Main ────────────────────────────────────────────────────────────── */
    main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ── Card base ───────────────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: 1.5rem;
      box-shadow: 0 8px 48px rgba(10, 61, 84, 0.13);
      padding: 2.75rem 2rem 2.25rem;
      width: 100%;
      max-width: 440px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.875rem;
    }

    /* ── Wait time display ───────────────────────────────────────────────── */
    .wait-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--teal);
    }

    /* Hero block: number + unit stacked */
    .wait-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      gap: 0.2rem;
    }

    /* THE dominant element — largest text on the page */
    .wait-number {
      font-size: 9rem;
      font-weight: 800;
      color: var(--teal);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .wait-unit {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.02em;
    }

    /* "No wait time" and loading states */
    .status-msg {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.4;
      padding: 1.25rem 0;
    }

    /* Decorative divider */
    .divider {
      width: 2.5rem;
      height: 3px;
      border-radius: 99px;
      background: var(--mint);
    }

    .timestamp {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Error state ─────────────────────────────────────────────────────── */
    .error-msg {
      font-size: 1rem;
      color: var(--red);
      line-height: 1.5;
    }

    /* ── Closed card ─────────────────────────────────────────────────────── */
    .closed-icon {
      font-size: 3rem;
      line-height: 1;
    }
    .closed-text {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.55;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 1rem 1rem 1.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .staff-link {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 0.8rem;
    }
    .staff-link:hover { color: var(--navy); }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .wait-number  { font-size: 7.5rem; }
      .wait-unit    { font-size: 1.25rem; }
      .status-msg   { font-size: 1.15rem; }
      .card         { padding: 2.25rem 1.25rem 1.75rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- Skip link: keyboard and screen reader users jump straight to wait time -->
  <a class="skip-link" href="#wait-region">Skip to wait time</a>

  <header class="site-header">
    <h1 id="clinic-name">Our Clinic</h1>
  </header>

  <main>

    <!--
      role="status" + aria-live="polite" + aria-atomic="true":
      Screen readers announce the full region whenever the wait time updates,
      without interrupting the user mid-sentence.
    -->
    <div
      id="wait-card"
      class="card"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      aria-label="Current clinic wait time"
    >
      <p class="wait-label" aria-hidden="true">Current Estimated Wait</p>

      <!-- id="wait-region" is the skip-link target -->
      <div id="wait-region" id="wait-display" tabindex="-1">
        <p class="status-msg">Loading&hellip;</p>
      </div>

      <div class="divider" aria-hidden="true"></div>
      <p class="timestamp" id="timestamp"></p>
    </div>

    <!--
      Closed card — announced to screen readers when clinic is closed.
      aria-hidden while invisible so it doesn't confuse screen readers.
    -->
    <div
      id="closed-card"
      class="card"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      aria-hidden="true"
      style="display:none;"
    >
      <span class="closed-icon" aria-hidden="true">🏥</span>
      <p class="closed-text" id="closed-msg">Clinic is currently closed.</p>
    </div>

  </main>

  <footer class="site-footer">
    <p>Updates automatically — no refresh needed</p>
    <a class="staff-link" href="staff.html" aria-label="Staff login portal">Staff Login</a>
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>

  <script>
    const db = (window.supabase && typeof window.supabase.createClient === 'function')
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const waitCard   = document.getElementById('wait-card');
    const closedCard = document.getElementById('closed-card');
    const waitDisp   = document.getElementById('wait-display');
    const closedMsg  = document.getElementById('closed-msg');
    const timestamp  = document.getElementById('timestamp');
    const clinicName = document.getElementById('clinic-name');

    const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

    function localTime(tz) {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: tz, hour: 'numeric', minute: 'numeric', hour12: false, weekday: 'long'
      }).formatToParts(new Date());
      const get = t => parts.find(p => p.type === t)?.value;
      const raw = get('hour');
      const [h, m] = (raw === '24' ? '0:00' : raw + ':' + (get('minute') || '00')).split(':').map(Number);
      return { day: get('weekday').toLowerCase(), mins: h * 60 + m };
    }

    function toMins(str) {
      if (!str) return null;
      const [h, m] = str.split(':').map(Number);
      return h * 60 + m;
    }

    function fmtTime(str) {
      const [h, m] = str.split(':').map(Number);
      return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function clinicIsOpen(config) {
      if (!config?.operating_hours) return true;
      const tz = config.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const { day, mins } = localTime(tz);
      const h = config.operating_hours[day];
      if (!h?.open || !h?.close) return false;
      return mins >= toMins(h.open) && mins < toMins(h.close);
    }

    function nextOpen(config) {
      if (!config?.operating_hours) return null;
      const tz = config.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const { day, mins } = localTime(tz);
      const todayIdx = DAYS.indexOf(day);
      for (let i = 0; i <= 7; i++) {
        const idx  = (todayIdx + i) % 7;
        const name = DAYS[idx];
        const h    = config.operating_hours[name];
        if (!h?.open) continue;
        if (i === 0 && mins >= toMins(h.open)) continue;
        const label = i === 0 ? 'today' : i === 1 ? 'tomorrow'
                    : name.charAt(0).toUpperCase() + name.slice(1);
        return `${fmtTime(h.open)} ${label}`;
      }
      return null;
    }

    function showWait(row) {
      const mins = row?.current_wait_minutes ?? 0;
      if (mins <= 0) {
        // Screen reader reads: "Current clinic wait time — There is currently no wait time"
        waitDisp.innerHTML = `<p class="status-msg">There is currently no wait time</p>`;
      } else {
        // Screen reader reads: "Current clinic wait time — [N] minutes"
        waitDisp.innerHTML = `
          <div class="wait-hero">
            <span class="wait-number">${mins}</span>
            <span class="wait-unit">minutes</span>
          </div>`;
      }
      if (row?.last_updated) {
        const d = new Date(row.last_updated);
        timestamp.textContent = 'Last updated ' +
          d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }
      waitCard.style.display   = 'flex';
      waitCard.removeAttribute('aria-hidden');
      closedCard.style.display = 'none';
      closedCard.setAttribute('aria-hidden', 'true');
    }

    function showClosed(config) {
      const next = nextOpen(config);
      closedMsg.textContent = next
        ? `Clinic is currently closed. Opens at ${next}.`
        : 'Clinic is currently closed.';
      waitCard.style.display  = 'none';
      waitCard.setAttribute('aria-hidden', 'true');
      closedCard.style.display = 'flex';
      closedCard.removeAttribute('aria-hidden');
    }

    function showError(msg) {
      waitDisp.innerHTML = `<p class="error-msg" role="alert">${msg}</p>`;
    }

    let config = null;

    async function refresh() {
      if (!db) {
        showError('Cannot connect to the database. Please check your internet and reload.');
        return;
      }
      try {
        if (!config) {
          const { data } = await db.from('clinic_config').select('*').single();
          config = data || {};
          if (config.clinic_name) {
            clinicName.textContent = config.clinic_name;
            document.title = config.clinic_name + ' — Wait Time';
          }
        }

        const { data: status, error } = await db
          .from('clinic_status').select('*')
          .order('last_updated', { ascending: false }).limit(1).single();

        if (error && error.code !== 'PGRST116') throw error;

        const override = status?.is_open_override;
        const isOpen   = override === true  ? true
                       : override === false ? false
                       : clinicIsOpen(config);

        if (!isOpen) { showClosed(config); return; }
        showWait(status);

      } catch (e) {
        console.error('Refresh error:', e);
        showError('Unable to load wait time. Please try refreshing the page.');
      }
    }

    refresh();
    setInterval(refresh, 5_000);
  </script>
</body>
</html>
