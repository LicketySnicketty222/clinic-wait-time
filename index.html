<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Wait Time</title>
  <style>
    :root {
      --teal:  #0d7a6e;
      --navy:  #0a3d54;
      --mint:  #e8f7f5;
      --bg:    #f4f8fb;
      --white: #ffffff;
      --muted: #6b8090;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--navy);
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 2.5rem 1rem 1rem;
      text-align: center;
    }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--navy);
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 1rem;
    }

    /* Card shared */
    .card {
      background: var(--white);
      border-radius: 1.25rem;
      box-shadow: 0 4px 28px rgba(13,122,110,0.12);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    /* Wait card */
    .eyebrow {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--teal);
    }
    .wait-number {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      color: var(--teal);
      letter-spacing: -0.04em;
    }
    .wait-unit {
      font-size: 2rem;
      font-weight: 600;
      color: var(--navy);
    }
    .wait-row {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }
    .msg {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--navy);
      padding: 0.5rem 0;
      line-height: 1.4;
    }
    .timestamp {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Closed card */
    .closed-icon { font-size: 3rem; }
    .closed-msg {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.5;
    }

    /* Footer */
    footer {
      padding: 1.25rem 1rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    footer a:hover { border-bottom-color: var(--muted); }

    @media (max-width: 480px) {
      .wait-number { font-size: 5rem; }
      .wait-unit   { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 id="clinic-name">Our Clinic</h1>
  </div>

  <main id="main-area">
    <!-- Wait card: shown when clinic is open -->
    <div class="card" id="wait-card">
      <p class="eyebrow">Current Estimated Wait</p>
      <div id="wait-display">
        <p class="msg" id="loading-msg">Loading&hellip;</p>
      </div>
      <p class="timestamp" id="timestamp"></p>
    </div>

    <!-- Closed card: shown when clinic is closed -->
    <div class="card" id="closed-card" style="display:none;">
      <span class="closed-icon">🏥</span>
      <p class="closed-msg" id="closed-msg">Clinic is currently closed.</p>
    </div>
  </main>

  <footer>
    <span>Updates automatically &mdash; no refresh needed</span>
    <a href="staff.html">Staff Login</a>
  </footer>

  <!-- Config (credentials + PIN) -->
  <script src="js/config.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>

  <script>
    // ── Setup ────────────────────────────────────────────────────────────────
    const db = (window.supabase && typeof window.supabase.createClient === 'function')
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const waitCard   = document.getElementById('wait-card');
    const closedCard = document.getElementById('closed-card');
    const waitDisp   = document.getElementById('wait-display');
    const closedMsg  = document.getElementById('closed-msg');
    const timestamp  = document.getElementById('timestamp');
    const clinicName = document.getElementById('clinic-name');

    // ── Helpers ──────────────────────────────────────────────────────────────
    const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

    function localTime(tz) {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: tz, hour: 'numeric', minute: 'numeric',
        hour12: false, weekday: 'long'
      }).formatToParts(new Date());
      const get = t => parts.find(p => p.type === t)?.value;
      const [h, m] = get('hour').split(':').map(Number);
      return { day: get('weekday').toLowerCase(), mins: h * 60 + m };
    }

    function toMins(str) {
      if (!str) return null;
      const [h, m] = str.split(':').map(Number);
      return h * 60 + m;
    }

    function fmtTime(str) {
      const [h, m] = str.split(':').map(Number);
      const p = h >= 12 ? 'PM' : 'AM';
      const hr = h % 12 === 0 ? 12 : h % 12;
      return `${hr}:${String(m).padStart(2,'0')} ${p}`;
    }

    function clinicIsOpen(config) {
      if (!config?.operating_hours || !config?.timezone) return true; // default open if no config
      const { day, mins } = localTime(config.timezone);
      const h = config.operating_hours[day];
      if (!h?.open || !h?.close) return false;
      return mins >= toMins(h.open) && mins < toMins(h.close);
    }

    function nextOpen(config) {
      if (!config?.operating_hours || !config?.timezone) return null;
      const { day, mins } = localTime(config.timezone);
      const todayIdx = DAYS.indexOf(day);
      for (let i = 0; i <= 7; i++) {
        const idx  = (todayIdx + i) % 7;
        const name = DAYS[idx];
        const h    = config.operating_hours[name];
        if (!h?.open) continue;
        if (i === 0 && mins >= toMins(h.open)) continue;
        const label = i === 0 ? 'today' : i === 1 ? 'tomorrow' : name.charAt(0).toUpperCase() + name.slice(1);
        return `${fmtTime(h.open)} ${label}`;
      }
      return null;
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function showWait(row) {
      const mins = row?.current_wait_minutes ?? 0;
      if (mins <= 0) {
        waitDisp.innerHTML = `<p class="msg">There is currently no wait time</p>`;
      } else {
        waitDisp.innerHTML = `
          <div class="wait-row">
            <span class="wait-number">${mins}</span>
            <span class="wait-unit">min</span>
          </div>`;
      }
      if (row?.last_updated) {
        const d = new Date(row.last_updated);
        timestamp.textContent = 'Updated ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }
      waitCard.style.display   = 'flex';
      closedCard.style.display = 'none';
    }

    function showClosed(config) {
      const next = nextOpen(config);
      closedMsg.textContent = next
        ? `Clinic is currently closed. Opens at ${next}.`
        : 'Clinic is currently closed.';
      waitCard.style.display   = 'none';
      closedCard.style.display = 'flex';
    }

    function showError(msg) {
      waitDisp.innerHTML = `<p class="msg" style="font-size:1rem;color:#c0392b;">${msg}</p>`;
    }

    // ── Main logic ───────────────────────────────────────────────────────────
    let config = null;

    async function refresh() {
      if (!db) { showError('Cannot connect. Check internet and reload.'); return; }

      try {
        // Load config (clinic name, hours, timezone)
        if (!config) {
          const { data } = await db.from('clinic_config').select('*').single();
          config = data || {};
          if (config.clinic_name) {
            clinicName.textContent = config.clinic_name;
            document.title = config.clinic_name + ' — Wait Time';
          }
        }

        // Fetch current status
        const { data: status, error } = await db
          .from('clinic_status').select('*')
          .order('last_updated', { ascending: false }).limit(1).single();

        if (error && error.code !== 'PGRST116') throw error; // PGRST116 = no rows

        // Check override first, then schedule
        const override = status?.is_open_override;
        const isOpen = override === true  ? true
                     : override === false ? false
                     : clinicIsOpen(config);

        if (!isOpen) { showClosed(config); return; }
        showWait(status);

      } catch (e) {
        console.error('Refresh error:', e);
        showError('Unable to load wait time. Please try refreshing.');
      }
    }

    // Run immediately, then every 30 seconds
    refresh();
    setInterval(refresh, 30_000);
  </script>
</body>
</html>
